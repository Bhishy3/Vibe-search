<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Antigravity AI Copilot</title>
  <style>
    :root {
      --bg-primary: #0a0b0e;
      --bg-secondary: #11141a;
      --bg-tertiary: #1b1e25;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --bg-active: rgba(255, 255, 255, 0.1);
      --accent-color: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    /* Header */
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      background: linear-gradient(135deg, #a78bfa, #f43f5e);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Chat Area */
    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .chat-message.user {
      align-self: flex-end;
      background-color: var(--accent-color);
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .chat-message.assistant {
      align-self: flex-start;
      background-color: var(--bg-tertiary);
      color: var(--text-main);
      border-bottom-left-radius: 2px;
      border: 1px solid var(--border-color);
    }

    .chat-message-sender {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.6;
      margin-bottom: 4px;
      display: block;
    }

    /* Actions Shelf */
    .actions-shelf {
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
    }

    .action-chip {
      padding: 6px 12px;
      border-radius: 16px;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-chip:hover {
      background-color: var(--bg-hover);
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Input Controls */
    .input-container {
      padding: 0 16px 16px 16px;
      display: flex;
      gap: 8px;
      background-color: var(--bg-secondary);
    }

    .chat-input {
      flex: 1;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-tertiary);
      color: var(--text-main);
      padding: 0 12px;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent-color);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background-color: var(--accent-color);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      transition: all 0.2s;
    }

    .send-btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 0 8px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">✨ Antigravity AI Copilot</div>
  </div>

  <div class="chat-history" id="chatHistory">
    <div class="chat-message assistant">
      <span class="chat-message-sender">Assistant</span>
      Hi! I am your built-in Gecko AI assistant. I have full read access to this tab's secure frame context. Ask me to summarize the page or help you analyze its content.
    </div>
  </div>

  <div class="actions-shelf">
    <button class="action-chip" id="btnSummarize">📝 Summarize Page</button>
    <button class="action-chip" id="btnAnalyze">🔍 Analyze DOM</button>
  </div>

  <div class="input-container">
    <input type="text" class="chat-input" id="chatInput" placeholder="Ask about this page..." />
    <button class="send-btn" id="btnSend">➜</button>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
